{% extends 'base.html' %}

{% block content %}

<style>

    .profile-bg{

        background-image: url('https://images.unsplash.com/photo-1505751172876-fa1923c5c528');

        background-size: cover;

        background-position: center;

        background-repeat: no-repeat;

        min-height: 100vh;

        padding: 60px 0;

        border-radius: 20px;

    }

    .profile-card{

        background: rgba(255,255,255,0.90);

        backdrop-filter: blur(8px);

        border-radius: 25px;

        padding: 40px;

        box-shadow: 0px 10px 30px rgba(0,0,0,0.2);

        animation: fadeIn 1s ease;

    }

    .profile-img{

        width: 120px;

        height: 120px;

        border-radius: 50%;

        object-fit: cover;

        border: 5px solid #0d6efd;

        margin-bottom: 20px;

    }

    .form-control{

        border-radius: 12px;

        padding: 12px;

    }

    .btn-update{

        border-radius: 12px;

        padding: 12px;

        font-weight: bold;

        transition: 0.3s;

    }

    .btn-update:hover{

        transform: scale(1.03);

    }

    @keyframes fadeIn{

        from{
            opacity:0;
            transform:translateY(20px);
        }

        to{
            opacity:1;
            transform:translateY(0px);
        }

    }

</style>

<div class="profile-bg">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="profile-card text-center">

                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                         class="profile-img">

                    <h2 class="mb-4">

                        <i class="fa-solid fa-user-doctor"></i>

                        My Profile

                    </h2>

                    <form method="POST">

                        <div class="mb-3 text-start">

                            <label class="form-label fw-bold">
                                Username
                            </label>

                            <input type="text"
                                   name="username"
                                   class="form-control"
                                   value="{{ current_user.username }}"
                                   required>

                        </div>

                        <div class="mb-4 text-start">

                            <label class="form-label fw-bold">
                                Email Address
                            </label>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   value="{{ current_user.email }}"
                                   required>

                        </div>

                        <button type="submit"
                                class="btn btn-primary btn-update w-100">

                            <i class="fa-solid fa-floppy-disk"></i>

                            Update Profile

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
