<!-- LOGIN.HTML -->

{% extends 'base.html' %}

{% block content %}

<style>

    body{
        min-height: 100vh;
        overflow: hidden;
        background: url('https://images.unsplash.com/photo-1505751172876-fa1923c5c528?q=80&w=1974&auto=format&fit=crop') no-repeat center center/cover;
        position: relative;
    }

    /* Dark Overlay */
    body::before{
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.65);
        backdrop-filter: blur(3px);
        z-index: 0;
    }

    .login-container{
        position: relative;
        z-index: 2;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .main-card{
        width: 100%;
        max-width: 450px;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 25px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        animation: floatCard 4s ease-in-out infinite;
        transition: 0.4s;
    }

    .main-card:hover{
        transform: scale(1.02);
        box-shadow: 0 15px 50px rgba(0,0,0,0.6);
    }

    h2{
        color: white;
        font-weight: 700;
        text-align: center;
        margin-bottom: 30px;
    }

    h2 i{
        color: #38bdf8;
        margin-right: 10px;
    }

    label{
        color: white;
        margin-bottom: 6px;
        font-weight: 500;
    }

    .form-control{
        background: rgba(255,255,255,0.12);
        border: none;
        color: white;
        border-radius: 14px;
        padding: 14px;
        transition: 0.3s ease;
    }

    .form-control::placeholder{
        color: #ddd;
    }

    .form-control:focus{
        background: rgba(255,255,255,0.18);
        box-shadow: 0 0 15px #38bdf8;
        border: 1px solid #38bdf8;
        color: white;
    }

    .btn-custom{
        background: linear-gradient(45deg,#0ea5e9,#2563eb);
        border: none;
        padding: 13px;
        border-radius: 14px;
        font-weight: bold;
        font-size: 17px;
        transition: 0.4s ease;
        letter-spacing: 1px;
    }

    .btn-custom:hover{
        transform: translateY(-3px);
        box-shadow: 0 0 20px rgba(14,165,233,0.7);
        background: linear-gradient(45deg,#0284c7,#1d4ed8);
    }

    .bottom-text{
        text-align: center;
        margin-top: 18px;
        color: white;
    }

    .bottom-text a{
        color: #38bdf8;
        font-weight: 600;
        text-decoration: none;
    }

    .bottom-text a:hover{
        color: white;
    }

    /* Floating Animation */
    @keyframes floatCard{
        0%{
            transform: translateY(0px);
        }
        50%{
            transform: translateY(-8px);
        }
        100%{
            transform: translateY(0px);
        }
    }

</style>

<div class="login-container">

    <div class="main-card">

        <h2>
            <i class="fa-solid fa-user-doctor"></i>
            AI Disease Login
        </h2>

        <form method="POST" action="/login">

            <div class="mb-3">
                <label>Email</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="Enter your email"
                       required>
            </div>

            <div class="mb-4">
                <label>Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter your password"
                       required>
            </div>

            <button class="btn btn-primary btn-custom w-100">
                Login
            </button>

        </form>

        <div class="bottom-text">
            Don't have an account?
            <a href="/signup">Signup</a>
        </div>

    </div>

</div>

{% endblock %}
